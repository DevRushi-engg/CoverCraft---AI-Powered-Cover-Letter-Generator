AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CoverCraft Backend Serverless Application. 
  Provides an API to generate cover letters using AWS Bedrock and saves history to DynamoDB.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME: !Ref HistoryTable

Resources:
  HistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CoverCraftApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'OPTIONS,POST,GET'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HistoryTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - aws-marketplace:ViewSubscriptions
                - aws-marketplace:Subscribe
                - aws-marketplace:Unsubscribe
              Resource: "*"
      Events:
        GenerateApi:
          Type: Api
          Properties:
            Path: /generate
            Method: post
            RestApiId: !Ref CoverCraftApi
        HistoryApi:
          Type: Api
          Properties:
            Path: /history
            Method: get
            RestApiId: !Ref CoverCraftApi

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${CoverCraftApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
